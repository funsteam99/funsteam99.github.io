about:
  title: "關於我們"
  content: "財團法人台北市社子文教基金會成立於1993年，以「響應社會公益，回饋鄉里」為宗旨，長期致力於社子地區的文化傳承與教育發展。"
  vision: "成為社子在地文化教育創新的典範，培育新世代人才，促進地方永續發展。"
  mission_list:
    - "深耕在地文化與教育"
    - "支持弱勢學童成長"
    - "推動數位學習平權"
    - "促進社區文化交流"

services:
  - icon: "🧒"
    title: "優質幼教"
    desc: "提供弱勢家庭學前兒童早期教育支持"
    badge: "服務 100+ 孩童"
  - icon: "🎭"
    title: "文化活動"
    desc: "舉辦地方導覽、工作坊與文藝展演"
    badge: "年度 12+ 場次"
  - icon: "🎓"
    title: "獎學金計畫"
    desc: "資助社子地區清寒學生，鼓勵向學進修"
    badge: "年度發放 50+ 份"

resources:
  - icon: "📚"
    tag: "數學教育"
    title: "均一平台 - 數學基礎課程"
