---
layout: default
---

<section class="bg-white py-12 md:py-16 border-b border-gray-100">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
    <p class="text-sm font-medium text-blue-600 mb-3">最新消息</p>
    <h1 class="text-3xl md:text-4xl font-bold text-gray-900 leading-tight">{{ page.title }}</h1>
    <p class="text-gray-500 mt-4">{{ page.date | date: "%Y-%m-%d" }}</p>
  </div>
</section>

<section class="py-10 md:py-14 bg-gray-50">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
    <article class="article-content bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-10">
      {% if page.image %}
      <figure class="mb-8">
        <img src="{{ page.image }}" alt="{{ page.title }}" class="w-full rounded-xl shadow-sm" loading="lazy" />
      </figure>
      {% endif %}

      {{ content }}
    </article>

    <div class="mt-8">
      <a href="/#news" class="inline-flex items-center text-blue-600 hover:text-blue-800 font-semibold">
        ← 回到新消息
      </a>
    </div>
  </div>
</section>
